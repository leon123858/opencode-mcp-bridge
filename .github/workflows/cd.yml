name: CD (Release)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ github.event.inputs.bump }}
          release_branches: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build Windows Executable
        run: GOOS=windows GOARCH=amd64 go build -o opencode-mcp-bridge-windows-amd64.exe ./cmd
          
      - name: Build Linux Executable
        run: GOOS=linux GOARCH=amd64 go build -o opencode-mcp-bridge-linux-amd64 ./cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: |
            opencode-mcp-bridge-windows-amd64.exe
            opencode-mcp-bridge-linux-amd64
