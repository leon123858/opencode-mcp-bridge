name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build Windows Executable
        run: GOOS=windows GOARCH=amd64 go build -o bin/opencode-mcp-bridge-windows-amd64.exe ./cmd
          
      - name: Build Linux Executable
        run: GOOS=linux GOARCH=amd64 go build -o bin/opencode-mcp-bridge-linux-amd64 ./cmd

      - name: Run Tests
        run: go test ./...
